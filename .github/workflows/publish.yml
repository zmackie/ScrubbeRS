name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  python-wheel:
    name: build python wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and smoke test wheel
        run: python scripts/test_python_package.py --artifact wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  python-sdist:
    name: build python sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and smoke test sdist
        run: python scripts/test_python_package.py --artifact sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  pypi-publish:
    name: upload release to PyPI
    needs:
      - python-wheel
      - python-sdist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  crate-publish:
    name: publish crate to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify package
        run: cargo publish --dry-run --locked --package scrubbers

      - name: Authenticate with crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked --package scrubbers --token "${{ steps.crates-auth.outputs.token }}"
