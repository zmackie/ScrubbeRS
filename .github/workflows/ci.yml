name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync TruffleHog signatures
        run: python scripts/sync_trufflehog_signatures.py

      - name: Verify TruffleHog detector coverage
        run: python scripts/verify_trufflehog_coverage.py

      - name: Rust format check
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test --all-targets

  python-binding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python binding smoke test
        run: python3 scripts/test_bindings.py --binding python

  node-binding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Node binding smoke test
        run: python3 scripts/test_bindings.py --binding node
